name: Rust

on:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Install nightly toolchain
      run: rustup default nightly
    
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "setup"
        cache-on-failure: true
    
    - name: Run tests
      env:
        CARGO_NET_GIT_FETCH_WITH_CLI: true # This is optional but allows the fetch to use the git binary
      run: |
        cargo test --all-features
